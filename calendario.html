<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Calendario 📅</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Quicksand', 'Comic Neue', cursive;
      background: #FFF0F5;
      color: #4A2B3D;
      padding: 20px;
    }
    .contenedor-calendario {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 4px 12px rgba(216, 111, 139, 0.15);
    }
    h1 {
      color: #B3416B;
      text-align: center;
      margin-bottom: 20px;
    }
    .btn-volver {
      background: #D86F8B;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-family: 'Quicksand', cursive;
      font-size: 0.9rem;
      margin-bottom: 20px;
      display: inline-block;
      text-decoration: none;
    }
    .btn-volver:hover {
      background: #B3416B;
    }
    
    /* Botones de sincronización */
    .botones-sync {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-sync {
      background: #D86F8B;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 25px;
      cursor: pointer;
      font-family: 'Quicksand', cursive;
      font-size: 0.8rem;
      transition: all 0.3s ease;
    }
    .btn-sync:hover {
      background: #B3416B;
      transform: scale(1.05);
    }
    .btn-sync.importar {
      background: #4ECDC4;
    }
    .btn-sync.importar:hover {
      background: #44b3aa;
    }
    
    .calendario-mes {
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #B3416B;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .btn-mes {
      background: #D86F8B;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
    }
    .agregar-evento {
      margin-bottom: 15px;
      padding: 10px;
      background: #FFF5F7;
      border-radius: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .agregar-evento input {
      flex: 2;
      padding: 8px;
      border: 2px solid #F4C2D0;
      border-radius: 20px;
      font-family: 'Quicksand', cursive;
    }
    .btn-agregar {
      background: #D86F8B;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
    }
    .calendario-dias-semana {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-weight: bold;
      color: #D86F8B;
      margin-bottom: 8px;
    }
    .calendario-dias {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .dia-calendario {
      background: #FFF5F7;
      border-radius: 8px;
      padding: 10px 4px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid #F4C2D0;
    }
    .dia-calendario:hover {
      background: #FFE4E8;
      transform: scale(1.05);
    }
    .dia-calendario.tiene-tareas {
      background: #FFD1DC;
      font-weight: bold;
    }
    .tareas-del-dia {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #F4C2D0;
    }
    .lista-tareas-fecha {
      max-height: 200px;
      overflow-y: auto;
    }
    .tarea-fecha-item {
      padding: 10px;
      background: #FFF5F7;
      border-radius: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid #F4C2D0;
    }
    .tarea-fecha-item:hover {
      background: #FFE4E8;
      transform: translateX(5px);
    }
    .tarea-info {
      flex: 1;
    }
    .tarea-titulo {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .tarea-detalle {
      font-size: 0.7rem;
      color: #C97A9A;
      margin-top: 3px;
      display: block;
    }
    .checkbox-fecha {
      width: 18px;
      height: 18px;
      accent-color: #D86F8B;
      cursor: pointer;
    }
    .btn-eliminar {
      background: #ff4444;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.7rem;
    }
    .tarea-completada {
      text-decoration: line-through;
      color: #C97A9A;
    }

    /* Modal de edición */
    .modal-editar {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-editar.activo {
      display: flex;
    }
    .modal-contenido {
      background: white;
      border-radius: 20px;
      padding: 25px;
      max-width: 400px;
      width: 90%;
      position: relative;
    }
    .modal-contenido h3 {
      color: #B3416B;
      margin-bottom: 15px;
    }
    .modal-contenido input, .modal-contenido textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 2px solid #F4C2D0;
      border-radius: 15px;
      font-family: 'Quicksand', cursive;
      resize: vertical;
    }
    .modal-contenido textarea {
      min-height: 100px;
    }
    .modal-btns {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .modal-btns button {
      padding: 8px 20px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-family: 'Quicksand', cursive;
    }
    .btn-guardar {
      background: #D86F8B;
      color: white;
    }
    .btn-cancelar {
      background: #E8A0B5;
      color: white;
    }
    .cerrar-modal {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 1.5rem;
      cursor: pointer;
      color: #D86F8B;
    }
    
    /* Mensaje de éxito */
    .toast-mensaje {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #4ECDC4;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-family: 'Quicksand', cursive;
      font-size: 0.9rem;
      z-index: 1100;
      animation: fadeOut 3s ease forwards;
    }
    @keyframes fadeOut {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
  </style>
</head>
<body>
  <div class="contenedor-calendario">
    <a href="index.html" class="btn-volver">← Volver al Blog</a>
    <h1>📅 Mi Calendario de Tareas</h1>
    
    <!-- Botones de sincronización entre dispositivos -->
    <div class="botones-sync">
      <button class="btn-sync" onclick="exportarTareas()">📤 Exportar tareas</button>
      <input type="file" id="importarArchivo" accept=".json" style="display:none" onchange="importarTareas(event)">
      <button class="btn-sync importar" onclick="document.getElementById('importarArchivo').click()">📥 Importar tareas</button>
      <button class="btn-sync" onclick="generarCodigoQR()">📱 Compartir enlace</button>
    </div>
    
    <div class="calendario-mes">
      <button class="btn-mes" onclick="cambiarMes(-1)">◀</button>
      <span id="mesActual"></span>
      <button class="btn-mes" onclick="cambiarMes(1)">▶</button>
    </div>
    
    <div class="agregar-evento">
      <input type="text" id="nueva-tarea" placeholder="Escribe una tarea...">
      <input type="date" id="fecha-tarea">
      <button class="btn-agregar" onclick="agregarTarea()">➕ Agregar</button>
    </div>
    
    <div class="calendario-dias-semana">
      <span>D</span><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span>
    </div>
    <div id="calendarioDias" class="calendario-dias"></div>
    
    <div class="tareas-del-dia">
      <h3>✨ Tareas del día ✨</h3>
      <div id="listaTareasFecha" class="lista-tareas-fecha"></div>
    </div>
  </div>

  <!-- Modal de edición -->
  <div id="modalEditar" class="modal-editar">
    <div class="modal-contenido">
      <span class="cerrar-modal" onclick="cerrarModal()">&times;</span>
      <h3>✏️ Editar tarea</h3>
      <input type="text" id="edit-titulo" placeholder="Título de la tarea">
      <textarea id="edit-detalles" placeholder="Detalles de la tarea..."></textarea>
      <div class="modal-btns">
        <button class="btn-guardar" onclick="guardarEdicion()">💾 Guardar</button>
        <button class="btn-cancelar" onclick="cerrarModal()">❌ Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    let fechaActual = new Date();
    let todasLasTareas = [];
    let tareaEditandoId = null;

    function cargarTareas() {
      const guardadas = localStorage.getItem('tareasCalendario');
      if (guardadas) {
        todasLasTareas = JSON.parse(guardadas);
      }
      renderizarCalendario();
    }

    function guardarTareas() {
      localStorage.setItem('tareasCalendario', JSON.stringify(todasLasTareas));
    }

    // 🆕 EXPORTAR TAREAS (Guardar en archivo)
    function exportarTareas() {
      if (todasLasTareas.length === 0) {
        alert('🌸 No hay tareas para exportar');
        return;
      }
      
      const dataStr = JSON.stringify(todasLasTareas, null, 2);
      const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
      const exportFileDefaultName = `mis-tareas_${new Date().toISOString().slice(0,10)}.json`;
      
      const linkElement = document.createElement('a');
      linkElement.setAttribute('href', dataUri);
      linkElement.setAttribute('download', exportFileDefaultName);
      linkElement.click();
      
      mostrarMensaje('📤 Tareas exportadas correctamente');
    }

    // 🆕 IMPORTAR TAREAS (Cargar desde archivo)
    function importarTareas(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      
      reader.onload = function(e) {
        try {
          const tareasImportadas = JSON.parse(e.target.result);
          
          // Validar que sea un array de tareas
          if (Array.isArray(tareasImportadas)) {
            todasLasTareas = tareasImportadas;
            guardarTareas();
            renderizarCalendario();
            mostrarMensaje(`✅ ¡Importadas ${tareasImportadas.length} tareas!`);
          } else {
            alert('❌ El archivo no tiene el formato correcto');
          }
        } catch (error) {
          alert('❌ Error al importar: archivo inválido');
        }
      };
      
      reader.readAsText(file);
      
      // Limpiar el input para poder importar el mismo archivo de nuevo
      event.target.value = '';
    }

    // 🆕 Mostrar mensaje temporal
    function mostrarMensaje(texto) {
      const mensaje = document.createElement('div');
      mensaje.className = 'toast-mensaje';
      mensaje.textContent = texto;
      document.body.appendChild(mensaje);
      
      setTimeout(() => {
        mensaje.remove();
      }, 3000);
    }

    // 🆕 Generar enlace para compartir (con las tareas codificadas en la URL)
    function generarCodigoQR() {
      const tareasJSON = JSON.stringify(todasLasTareas);
      // Comprimir un poco las tareas para que quepan en la URL
      const tareasComprimidas = btoa(encodeURIComponent(tareasJSON));
      
      // Obtener la URL actual sin parámetros
      const urlActual = window.location.href.split('?')[0];
      const urlCompartir = `${urlActual}?t=${tareasComprimidas}`;
      
      // Mostrar modal con el enlace
      mostrarModalCompartir(urlCompartir);
    }

    // Modal para compartir enlace
    function mostrarModalCompartir(url) {
      // Crear modal si no existe
      let modalCompartir = document.getElementById('modalCompartir');
      if (!modalCompartir) {
        modalCompartir = document.createElement('div');
        modalCompartir.id = 'modalCompartir';
        modalCompartir.className = 'modal-editar';
        modalCompartir.innerHTML = `
          <div class="modal-contenido">
            <span class="cerrar-modal" onclick="cerrarModalCompartir()">&times;</span>
            <h3>📱 Compartir tareas</h3>
            <p style="margin-bottom:15px;">Comparte este enlace en tu celular:</p>
            <input type="text" id="enlaceCompartir" style="width:100%; padding:10px; border-radius:15px; border:2px solid #F4C2D0; font-family:monospace; font-size:12px;" readonly>
            <div class="modal-btns" style="margin-top:15px;">
              <button class="btn-guardar" onclick="copiarEnlace()">📋 Copiar enlace</button>
              <button class="btn-cancelar" onclick="cerrarModalCompartir()">Cerrar</button>
            </div>
          </div>
        `;
        document.body.appendChild(modalCompartir);
      }
      
      document.getElementById('enlaceCompartir').value = url;
      modalCompartir.classList.add('activo');
    }

    function cerrarModalCompartir() {
      const modal = document.getElementById('modalCompartir');
      if (modal) modal.classList.remove('activo');
    }

    function copiarEnlace() {
      const input = document.getElementById('enlaceCompartir');
      input.select();
      document.execCommand('copy');
      mostrarMensaje('📋 Enlace copiado al portapapeles');
    }

    // Cargar tareas desde URL (cuando se abre en otro dispositivo)
    function cargarTareasDesdeURL() {
      const urlParams = new URLSearchParams(window.location.search);
      const tareasParam = urlParams.get('t');
      
      if (tareasParam) {
        try {
          const tareasJSON = decodeURIComponent(atob(tareasParam));
          const tareasImportadas = JSON.parse(tareasJSON);
          if (Array.isArray(tareasImportadas) && tareasImportadas.length > 0) {
            todasLasTareas = tareasImportadas;
            guardarTareas();
            renderizarCalendario();
            mostrarMensaje('🎉 ¡Tareas cargadas desde el enlace!');
            
            // Limpiar la URL sin recargar
            window.history.replaceState({}, document.title, window.location.pathname);
          }
        } catch (e) {
          console.log('No hay tareas en la URL o están corruptas');
        }
      }
    }

    function agregarTarea() {
      const input = document.getElementById('nueva-tarea');
      const fechaInput = document.getElementById('fecha-tarea');
      const texto = input.value.trim();
      const fecha = fechaInput.value;
      
      if (texto === '') {
        alert('🌸 Escribe una tarea');
        return;
      }
      if (fecha === '') {
        alert('📅 Selecciona una fecha');
        return;
      }
      
      todasLasTareas.push({
        id: Date.now(),
        texto: texto,
        detalles: '',
        fecha: fecha,
        completada: false
      });
      
      guardarTareas();
      input.value = '';
      fechaInput.value = '';
      renderizarCalendario();
      mostrarMensaje('✨ Tarea agregada');
    }

    function eliminarTarea(id) {
      if (confirm('¿Estás segura de que quieres eliminar esta tarea?')) {
        todasLasTareas = todasLasTareas.filter(t => t.id !== id);
        guardarTareas();
        renderizarCalendario();
        mostrarMensaje('🗑️ Tarea eliminada');
      }
    }

    function toggleCompletar(id) {
      const tarea = todasLasTareas.find(t => t.id === id);
      if (tarea) {
        tarea.completada = !tarea.completada;
        guardarTareas();
        renderizarCalendario();
        mostrarMensaje(tarea.completada ? '✅ Tarea completada' : '🔄 Tarea pendiente');
      }
    }

    function abrirModalEditar(id) {
      tareaEditandoId = id;
      const tarea = todasLasTareas.find(t => t.id === id);
      if (tarea) {
        document.getElementById('edit-titulo').value = tarea.texto;
        document.getElementById('edit-detalles').value = tarea.detalles || '';
        document.getElementById('modalEditar').classList.add('activo');
      }
    }

    function guardarEdicion() {
      const nuevoTitulo = document.getElementById('edit-titulo').value.trim();
      const nuevosDetalles = document.getElementById('edit-detalles').value;
      
      if (nuevoTitulo === '') {
        alert('🌸 El título de la tarea no puede estar vacío');
        return;
      }
      
      const tarea = todasLasTareas.find(t => t.id === tareaEditandoId);
      if (tarea) {
        tarea.texto = nuevoTitulo;
        tarea.detalles = nuevosDetalles;
        guardarTareas();
        renderizarCalendario();
        mostrarMensaje('💾 Tarea actualizada');
      }
      
      cerrarModal();
    }

    function cerrarModal() {
      document.getElementById('modalEditar').classList.remove('activo');
      tareaEditandoId = null;
    }

    function renderizarCalendario() {
      const year = fechaActual.getFullYear();
      const month = fechaActual.getMonth();
      
      const primerDia = new Date(year, month, 1);
      const ultimoDia = new Date(year, month + 1, 0);
      const inicioSemana = primerDia.getDay();
      
      const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
      document.getElementById('mesActual').textContent = `${meses[month]} ${year}`;
      
      let html = '';
      for (let i = 0; i < inicioSemana; i++) {
        html += '<div class="dia-calendario"></div>';
      }
      
      for (let dia = 1; dia <= ultimoDia.getDate(); dia++) {
        const fechaStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
        const tareasEnFecha = todasLasTareas.filter(t => t.fecha === fechaStr);
        const tieneTareas = tareasEnFecha.length > 0;
        
        html += `<div class="dia-calendario ${tieneTareas ? 'tiene-tareas' : ''}" onclick="seleccionarFecha('${fechaStr}')">${dia}</div>`;
      }
      
      document.getElementById('calendarioDias').innerHTML = html;
      
      const hoy = `${year}-${String(month + 1).padStart(2, '0')}-01`;
      mostrarTareasPorFecha(hoy);
    }

    function seleccionarFecha(fecha) {
      document.getElementById('fecha-tarea').value = fecha;
      mostrarTareasPorFecha(fecha);
    }

    function mostrarTareasPorFecha(fecha) {
      const tareasEnFecha = todasLasTareas.filter(t => t.fecha === fecha);
      const container = document.getElementById('listaTareasFecha');
      
      if (tareasEnFecha.length === 0) {
        container.innerHTML = '<p style="color:#C97A9A; text-align:center;">✨ No hay tareas para esta fecha ✨<br><small style="font-size:11px;">Haz clic en un día o agrega tareas</small></p>';
        return;
      }
      
      container.innerHTML = tareasEnFecha.map(tarea => `
        <div class="tarea-fecha-item" onclick="abrirModalEditar(${tarea.id})">
          <input type="checkbox" class="checkbox-fecha" ${tarea.completada ? 'checked' : ''} onclick="event.stopPropagation(); toggleCompletar(${tarea.id})">
          <div class="tarea-info">
            <div class="tarea-titulo ${tarea.completada ? 'tarea-completada' : ''}">${escapeHtml(tarea.texto)}</div>
            ${tarea.detalles ? `<div class="tarea-detalle">📝 ${escapeHtml(tarea.detalles.substring(0, 50))}${tarea.detalles.length > 50 ? '...' : ''}</div>` : '<div class="tarea-detalle" style="color:#E8A0B5;">✨ Haz clic para añadir detalles ✨</div>'}
          </div>
          <button class="btn-eliminar" onclick="event.stopPropagation(); eliminarTarea(${tarea.id})">🗑️</button>
        </div>
      `).join('');
    }

    function cambiarMes(delta) {
      fechaActual.setMonth(fechaActual.getMonth() + delta);
      renderizarCalendario();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Cerrar modal haciendo clic fuera
    document.getElementById('modalEditar').addEventListener('click', function(e) {
      if (e.target === this) cerrarModal();
    });

    // Inicializar: cargar tareas y luego verificar URL
    cargarTareas();
    cargarTareasDesdeURL();
  </script>
</body>
</html>
