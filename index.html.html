<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blogsillo pillo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Quicksand', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
      background: #FFF0F5;
      color: #4A2B3D;
    }

    nav {
      background: #D86F8B;
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: .8rem;
      flex-wrap: wrap;
      margin: 1rem;
      border-radius: 50px;
    }
    nav a {
      color: #FFF0F5;
      text-decoration: none;
      font-size: .95rem;
      font-family: 'Quicksand', 'Comic Neue', cursive;
      font-weight: 600;
      transition: color .2s;
    }
    nav a:hover { color: #FFE4B5; }

    .contenedor {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 2rem;
    }

    .articulo {
      background: #FFFFFF;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 2rem;
      box-shadow: 0 4px 12px rgba(216, 111, 139, 0.15);
      transition: transform 0.3s ease;
    }
    .articulo:hover {
      transform: translateY(-5px);
    }
    .articulo-img {
      width: 100%;
      height: auto;
      min-height: 200px;
      max-height: 400px;
      overflow: hidden;
      background: #FFD1DC;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .articulo-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }
    .articulo-img img:hover {
      transform: scale(1.05);
    }
    .articulo-body { padding: 1.5rem; }
    .categoria {
      display: inline-block;
      background: #F4A4B8;
      color: white;
      font-size: .75rem;
      font-family: 'Quicksand', 'Comic Neue', cursive;
      font-weight: 600;
      padding: .2rem .7rem;
      border-radius: 20px;
      margin-bottom: .8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .articulo h2 { 
      font-size: 1.4rem; 
      margin-bottom: .5rem; 
      font-family: 'Quicksand', 'Comic Neue', cursive;
      color: #B3416B;
      font-weight: 700;
    }
    .meta { 
      font-size: .82rem; 
      color: #C97A9A; 
      font-family: 'Quicksand', 'Comic Neue', cursive; 
      margin-bottom: .8rem; 
      font-weight: 500;
    }
    .articulo p { 
      line-height: 1.7; 
      color: #5C3D4F; 
      font-family: 'Quicksand', 'Comic Neue', cursive; 
    }
    .leer-mas {
      display: inline-block;
      margin-top: 1rem;
      background: #D86F8B;
      color: white;
      padding: .5rem 1.2rem;
      border-radius: 25px;
      font-family: 'Quicksand', 'Comic Neue', cursive;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
    }
    .leer-mas:hover { 
      background: #B3416B;
      transform: scale(1.05);
    }

    /* Estilos para la lista de tareas */
    .lista-tareas {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1rem 0;
    }

    .tarea-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #FFF5F7;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid #F4C2D0;
    }

    .tarea-item:hover {
      background: #FFE4E8;
      transform: translateX(5px);
    }

    .tarea-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #D86F8B;
    }

    .tarea-item span {
      flex: 1;
      font-size: 1rem;
      color: #4A2B3D;
      transition: all 0.3s ease;
      font-family: 'Quicksand', 'Comic Neue', cursive;
    }

    .tarea-checkbox:checked + span {
      text-decoration: line-through;
      color: #C97A9A;
    }

    /* Estilos para tareas de días de la semana */
    .tareas-dia-container {
      margin-bottom: 20px;
    }

    .agregar-tarea-dia {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .input-pequeno {
      flex: 2;
      padding: 6px 10px;
      border: 2px solid #F4C2D0;
      border-radius: 20px;
      font-family: 'Quicksand', cursive;
      font-size: 0.8rem;
      background: #FFF5F7;
    }

    .btn-pequeno {
      background: #D86F8B;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Quicksand', cursive;
      font-size: 0.75rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-pequeno:hover {
      background: #B3416B;
      transform: scale(1.05);
    }

    /* Estilos para tareas con fecha */
    .tarea-fecha {
      font-size: 0.75rem;
      color: #D86F8B;
      margin-left: 10px;
      font-weight: 500;
    }

    .tarea-vencida {
      color: #ff4444 !important;
    }

    /* Botones para agregar/eliminar tareas */
    .tareas-controles {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      flex-direction: column;
    }

    .input-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-tarea {
      background: #D86F8B;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 25px;
      cursor: pointer;
      font-family: 'Quicksand', 'Comic Neue', cursive;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-tarea:hover {
      background: #B3416B;
      transform: scale(1.05);
    }

    .btn-eliminar {
      background: #E8A0B5;
    }

    .btn-eliminar:hover {
      background: #D86F8B;
    }

    .nueva-tarea-input {
      flex: 2;
      padding: 8px 12px;
      border: 2px solid #F4C2D0;
      border-radius: 25px;
      font-family: 'Quicksand', 'Comic Neue', cursive;
      font-size: 0.9rem;
      background: #FFF5F7;
    }

    .fecha-input {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid #F4C2D0;
      border-radius: 25px;
      font-family: 'Quicksand', 'Comic Neue', cursive;
      font-size: 0.9rem;
      background: #FFF5F7;
    }

    .nueva-tarea-input:focus, .fecha-input:focus {
      outline: none;
      border-color: #D86F8B;
    }

    /* Estilos para la imagen de motivación */
    .motivacion-container {
      margin-top: 25px;
      margin-bottom: 10px;
      text-align: center;
    }

    .motivacion-marco {
      background: #FFE4E8;
      padding: 15px;
      border-radius: 20px;
      display: block;
      width: 100%;
      border: 2px solid #F4C2D0;
    }

    .motivacion-imagen {
      width: 100%;
      height: auto;
      max-height: 300px;
      object-fit: contain;
      border-radius: 12px;
      display: block;
    }

    .motivacion-texto {
      margin-top: 15px;
      font-size: 1.3rem;
      font-weight: bold;
      color: #D86F8B;
      font-family: 'Quicksand', 'Comic Neue', cursive;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.activo { display: flex; }
    .modal {
      background: #FFFFFF;
      max-width: 650px;
      width: 90%;
      border-radius: 20px;
      padding: 2rem;
      position: relative;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal h2 { 
      font-size: 1.6rem; 
      margin-bottom: .5rem; 
      font-family: 'Quicksand', 'Comic Neue', cursive;
      color: #B3416B;
    }
    .modal .meta { margin-bottom: 1rem; }
    .modal p { 
      line-height: 1.8; 
      color: #5C3D4F; 
      margin-bottom: 1rem; 
      font-family: 'Quicksand', 'Comic Neue', cursive; 
    }
    .cerrar {
      position: absolute;
      top: 1rem; right: 1.2rem;
      font-size: 1.5rem;
      cursor: pointer;
      background: none;
      border: none;
      color: #D86F8B;
      font-weight: bold;
    }
    .cerrar:hover {
      color: #B3416B;
    }

    /* Estilos para el GIF en el modal */
    .modal-gif-container {
      text-align: center;
      margin: 20px 0;
      padding: 10px;
      background: #FFF5F7;
      border-radius: 12px;
    }
    .modal-gif-container img {
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    aside { display: flex; flex-direction: column; gap: 1.5rem; }
    .widget {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 1.2rem;
      box-shadow: 0 4px 12px rgba(216, 111, 139, 0.1);
    }
    .widget h3 {
      font-family: 'Quicksand', 'Comic Neue', cursive;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
      padding-bottom: .5rem;
      border-bottom: 2px solid #D86F8B;
      color: #B3416B;
      font-weight: 700;
    }

    /* Widget de música */
    .widget-musica {
      background: linear-gradient(135deg, #FFE4E8, #FFD1DC);
    }
    .musica-iframe {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
      min-height: 232px;
      aspect-ratio: 16/9;
    }
    .musica-info {
      text-align: center;
      margin-top: 10px;
      font-size: 0.8rem;
      color: #B3416B;
      font-family: 'Quicksand', cursive;
    }

    /* Widget de slideshow de paisajes */
    .widget-paisajes {
      background: linear-gradient(135deg, #E8F4FD, #D1E8F5);
    }
    .slideshow-paisajes {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      border-radius: 12px;
      background: #B8D4E3;
    }
    .slide-paisaje {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .slide-paisaje img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .slide-paisaje.activo {
      opacity: 1;
    }
    .slideshow-paisajes-btns {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem;
      background: #D86F8B;
      border-radius: 0 0 12px 12px;
      margin-top: -4px;
    }
    .btn-paisaje {
      background: #FFFFFF;
      color: #D86F8B;
      border: none;
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
      font-family: 'Quicksand', cursive;
      font-weight: bold;
    }
    .btn-paisaje:hover {
      background: #B3416B;
      color: white;
    }
    .indicadores-paisajes {
      text-align: center;
      margin-top: 8px;
    }
    .dot {
      height: 8px;
      width: 8px;
      background-color: #F4C2D0;
      border-radius: 50%;
      display: inline-block;
      margin: 0 4px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .dot.activo {
      background-color: #D86F8B;
      width: 20px;
      border-radius: 4px;
    }

    .slideshow {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      border-radius: 12px 12px 0 0;
      background: #FFD1DC;
    }
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .6s ease;
    }
    .slide img { width: 100%; height: 100%; object-fit: cover; }
    .slide.activo { opacity: 1; }
    .slide-btns {
      display: flex;
      justify-content: space-between;
      padding: .5rem;
      background: #D86F8B;
      border-radius: 0 0 12px 12px;
    }
    .slide-btn {
      background: #FFFFFF;
      color: #D86F8B;
      border: none;
      padding: .3rem .9rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
      font-family: 'Quicksand', 'Comic Neue', cursive;
      font-weight: bold;
    }
    .slide-btn:hover { background: #B3416B; color: white; }

    footer {
      background: #D86F8B;
      color: #FFF0F5;
      text-align: center;
      padding: 1.5rem;
      margin-top: 2rem;
      font-family: 'Quicksand', 'Comic Neue', cursive;
      font-size: .85rem;
    }

    /* Pestañas para días de la semana */
    .tabs-semana {
      display: flex;
      gap: 5px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tab-btn {
      background: #FFF0F5;
      border: 2px solid #F4C2D0;
      padding: 8px 12px;
      border-radius: 25px;
      cursor: pointer;
      font-family: 'Quicksand', cursive;
      font-weight: 600;
      color: #D86F8B;
      transition: all 0.3s ease;
    }

    .tab-btn.activo {
      background: #D86F8B;
      color: white;
      border-color: #D86F8B;
    }

    .tab-btn:hover {
      background: #F4A4B8;
      color: white;
    }

    .contenido-dia {
      display: none;
    }

    .contenido-dia.activo {
      display: block;
    }

    @media (max-width: 640px) {
      .contenedor { grid-template-columns: 1fr; }
      .articulo-img {
        max-height: 300px;
      }
      .motivacion-texto {
        font-size: 1rem;
      }
      .tareas-controles {
        flex-direction: column;
      }
      .musica-iframe {
        min-height: 180px;
      }
      .input-group {
        flex-direction: column;
      }
      .tab-btn {
        font-size: 0.7rem;
        padding: 5px 8px;
      }
    }
  </style>
</head>
<body>

<nav>
  <a href="#">Inicio</a>
  <a href="#">Tecnología</a>
  <a href="#">Viajes</a>
  <a href="#">Música</a>
  <a href="calendario.html">📅 Calendario</a>
</nav>

<div class="contenedor">
  <main id="posts"></main>
  <aside>

    <!-- WIDGET 1: Slideshow de imágenes personales -->
    <div class="widget" style="padding:0;overflow:hidden;border-radius:16px;">
      <div class="slideshow" id="slideshow">
        <div class="slide activo"><img src="chii.jpg" alt="Foto 1"></div>
        <div class="slide"><img src="umibe.jpg" alt="Foto 2"></div>
        <div class="slide"><img src="gwen.jpg" alt="Foto 3"></div>
        <div class="slide"><img src="Isobe.jpg" alt="Foto 4"></div>
      </div>
      <div class="slide-btns">
        <button class="slide-btn" onclick="cambiarSlide(-1)">◀</button>
        <button class="slide-btn" onclick="cambiarSlide(1)">▶</button>
      </div>
    </div>

    <!-- WIDGET 2: SLIDESHOW DE PAISAJES -->
    <div class="widget widget-paisajes">
      <h3>🏔️ Paisajes que Inspiran 🌅</h3>
      <div class="slideshow-paisajes" id="slideshowPaisajes">
        <div class="slide-paisaje activo"><img src="Ipanema.jpg" alt="Paisaje 1"></div>
        <div class="slide-paisaje"><img src="Japan1.jpg" alt="Paisaje 2"></div>
        <div class="slide-paisaje"><img src="Japan2.jpg" alt="Paisaje 3"></div>
      </div>
      <div class="slideshow-paisajes-btns">
        <button class="btn-paisaje" onclick="cambiarPaisaje(-1)">◀</button>
        <button class="btn-paisaje" onclick="cambiarPaisaje(1)">▶</button>
      </div>
      <div class="indicadores-paisajes" id="indicadoresPaisajes"></div>
    </div>

    <!-- Widget de música -->
    <div class="widget widget-musica">
      <h3>🎵 Mi playlist favorita 🎵</h3>
      <iframe class="musica-iframe" 
        src="https://www.youtube.com/embed/videoseries?list=PLl4CgAo8Zq4hNkAEh5VOC-XgGnkk6yuPF" 
        title="YouTube Playlist" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        referrerpolicy="strict-origin-when-cross-origin" 
        allowfullscreen>
      </iframe>
      <div class="musica-info">
        🎧 Mi playlist favorita 🎵
      </div>
    </div>

  </aside>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="cerrar" onclick="cerrarModal()">✕</button>
    <span class="categoria" id="m-cat"></span>
    <h2 id="m-titulo"></h2>
    <p class="meta" id="m-meta"></p>
    <div id="m-contenido"></div>
  </div>
</div>

<footer>
  <p>🌸 © 2026 Mi Blog · Hecho con 💖 y mucha ternura 🌸</p>
</footer>

<script>
  // ── SLIDESHOW PRINCIPAL ──────────────────────────────────────────
  const slides = document.querySelectorAll('.slide');
  let actualSlide = 0, timerPrincipal;

  function irA(n) {
    slides[actualSlide].classList.remove('activo');
    actualSlide = (n + slides.length) % slides.length;
    slides[actualSlide].classList.add('activo');
    reiniciarTimerPrincipal();
  }

  function cambiarSlide(dir) { irA(actualSlide + dir); }

  function reiniciarTimerPrincipal() {
    clearInterval(timerPrincipal);
    timerPrincipal = setInterval(() => cambiarSlide(1), 4000);
  }
  reiniciarTimerPrincipal();

  // ── SLIDESHOW DE PAISAJES ───────────────────────────────────
  let imagenesPaisajes = [
    "Ipanema.jpg",
    "Japan1.jpg",
    "Japan2.jpg"
  ];
  
  let slidesPaisajes = document.querySelectorAll('.slide-paisaje');
  let actualPaisaje = 0;
  let timerPaisajes;

  function cargarImagenesPaisajes() {
    slidesPaisajes.forEach((slide, index) => {
      if (index < imagenesPaisajes.length) {
        const img = slide.querySelector('img');
        if (img) {
          img.src = imagenesPaisajes[index];
          img.alt = `Paisaje ${index + 1}`;
        }
      }
    });
    crearIndicadores();
  }

  function crearIndicadores() {
    const container = document.getElementById('indicadoresPaisajes');
    if (!container) return;
    container.innerHTML = '';
    for (let i = 0; i < slidesPaisajes.length; i++) {
      const dot = document.createElement('span');
      dot.classList.add('dot');
      if (i === actualPaisaje) dot.classList.add('activo');
      dot.onclick = () => irAPaisaje(i);
      container.appendChild(dot);
    }
  }

  function actualizarIndicadores() {
    const dots = document.querySelectorAll('#indicadoresPaisajes .dot');
    dots.forEach((dot, index) => {
      if (index === actualPaisaje) dot.classList.add('activo');
      else dot.classList.remove('activo');
    });
  }

  function irAPaisaje(n) {
    slidesPaisajes[actualPaisaje].classList.remove('activo');
    actualPaisaje = (n + slidesPaisajes.length) % slidesPaisajes.length;
    slidesPaisajes[actualPaisaje].classList.add('activo');
    actualizarIndicadores();
    reiniciarTimerPaisajes();
  }

  function cambiarPaisaje(dir) { irAPaisaje(actualPaisaje + dir); }

  function reiniciarTimerPaisajes() {
    clearInterval(timerPaisajes);
    timerPaisajes = setInterval(() => cambiarPaisaje(1), 5000);
  }
  cargarImagenesPaisajes();
  reiniciarTimerPaisajes();

  // ── FUNCIONES PARA TAREAS POR DÍA DE LA SEMANA ─────────────
  const diasSemana = ['lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado', 'domingo'];
  let tareasPorDia = {};

  function guardarTareasPorDia() {
    localStorage.setItem('tareasPorDia', JSON.stringify(tareasPorDia));
  }

  function cargarTareasPorDia() {
    const tareasGuardadas = localStorage.getItem('tareasPorDia');
    if (tareasGuardadas) {
      tareasPorDia = JSON.parse(tareasGuardadas);
    } else {
      diasSemana.forEach(dia => {
        tareasPorDia[dia] = [];
      });
    }
  }

  function renderizarTareasPorDia(dia) {
    const container = document.getElementById(`tareas-${dia}`);
    if (!container) return;
    
    const tareas = tareasPorDia[dia] || [];
    
    if (tareas.length === 0) {
      container.innerHTML = '<p style="text-align:center; color:#C97A9A; padding:10px;">✨ No hay tareas para este día ✨</p>';
      return;
    }
    
    container.innerHTML = tareas.map((tarea, index) => `
      <label class="tarea-item">
        <input type="checkbox" class="tarea-checkbox-dia" data-dia="${dia}" data-index="${index}" ${tarea.completada ? 'checked' : ''}>
        <div style="flex: 1;">
          <span style="${tarea.completada ? 'text-decoration: line-through; color: #C97A9A;' : ''}">${escapeHtml(tarea.texto)}</span>
          ${tarea.fechaLimite ? `<div class="tarea-fecha">📅 ${tarea.fechaLimite}</div>` : ''}
        </div>
      </label>
    `).join('');
    
    document.querySelectorAll('.tarea-checkbox-dia').forEach(checkbox => {
      checkbox.addEventListener('change', function(e) {
        const dia = this.getAttribute('data-dia');
        const index = parseInt(this.getAttribute('data-index'));
        if (tareasPorDia[dia] && tareasPorDia[dia][index]) {
          tareasPorDia[dia][index].completada = this.checked;
          guardarTareasPorDia();
          renderizarTareasPorDia(dia);
        }
      });
    });
  }

  function agregarTareaDia(dia) {
    const input = document.getElementById(`input-${dia}`);
    const fechaInput = document.getElementById(`fecha-${dia}`);
    const texto = input.value.trim();
    const fechaLimite = fechaInput.value;
    
    if (texto === '') {
      alert(`🌸 Por favor escribe una tarea para el ${dia} 🌸`);
      return;
    }
    
    if (!tareasPorDia[dia]) {
      tareasPorDia[dia] = [];
    }
    
    tareasPorDia[dia].push({
      id: Date.now(),
      texto: texto,
      fechaLimite: fechaLimite,
      completada: false
    });
    
    guardarTareasPorDia();
    input.value = '';
    fechaInput.value = '';
    renderizarTareasPorDia(dia);
  }

  function cambiarDia(dia) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('activo'));
    document.querySelector(`.tab-btn[data-dia="${dia}"]`).classList.add('activo');
    document.querySelectorAll('.contenido-dia').forEach(contenido => contenido.classList.remove('activo'));
    document.getElementById(`dia-${dia}`).classList.add('activo');
    renderizarTareasPorDia(dia);
  }

  function eliminarUltimaTareaDia(dia) {
    if (!tareasPorDia[dia] || tareasPorDia[dia].length === 0) {
      alert(`✨ No hay tareas para eliminar en ${dia} ✨`);
      return;
    }
    tareasPorDia[dia].pop();
    guardarTareasPorDia();
    renderizarTareasPorDia(dia);
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ── POSTS ─────────────────────────────────────────────────
  const posts = [
    {
      imagen: "Buddha.jpg",
      categoria: "Tecnología",
      titulo: "Lista de tareas (˶ ´༥` ˶)୭",
      fecha: "1 de mayo, 2026",
      autor: "Yo mismo",
      resumen: "Tareas pendientes que aún no puedo completar pero en las que puedo trabajar",
      contenido: ``,
      gif: "Keep.gif"
    },
    {
      imagen: "alien.jpg",
      categoria: "Organización",
      titulo: "Tareas por día de la semana",
      fecha: "20 de abril, 2026",
      autor: "Yo mismo",
      resumen: "Organiza tus tareas por cada día de la semana con fechas límite 🌸",
      contenido: ``,
      gif: null
    },
    {
      imagen: "https://via.placeholder.com/800x400/E8A0B5/white?text=Libros",
      categoria: "Libros",
      titulo: "QUE ESTUDIAR PARA ROTACIÓN DE PARTOS",
      fecha: "10 de abril, 2026",
      autor: "Yo mismo",
      resumen: "Ojo muy importante.",
      contenido: `<p>Fisiología del trabajo de parto

Las 4 etapas del trabajo de parto (dilatación, expulsivo, alumbramiento y posparto inmediato)
Mecanismos del trabajo de parto (encajamiento, descenso, rotación, extensión, etc.)
Diferencia entre trabajo de parto verdadero y falso
Clasificación de la presentación fetal (cefálica, podálica, transversa)

Monitoría fetal

Cómo interpretar una cardiotocografía (CTG) básica
Valores normales de la frecuencia cardíaca fetal (110–160 lpm)
Reconocer desaceleraciones tempranas, tardías y variables

Signos vitales y valoración materna

Rangos normales en la gestante (TA, FC, temperatura)
Señales de alarma: hipertensión, sangrado, fiebre, disminución del movimiento fetal


💊 Farmacología básica en sala de partos

Oxitocina: dosis, indicaciones, riesgos (hiperstimulación uterina)
Misoprostol: uso en inducción y posparto
Sulfato de magnesio: manejo de la preeclampsia severa, signos de toxicidad
Ergometrina / metilergonovina: control del sangrado posparto
Analgesia epidural: conceptos básicos, posición para el procedimiento


🔬 Procedimientos que debes reconocer y/o apoyar

Amniotomía (rotura artificial de membranas)
Control de la dilatación cervical y borramiento
Maniobras de Leopold
Episiotomía y su reparación
Alumbramiento activo (manejo activo de la tercera etapa)
Atención inmediata del recién nacido: APGAR, ligadura del cordón, termorregulación


⚠️ Emergencias obstétricas que debes conocer (aunque no vayas a manejarlas solas)

Hemorragia posparto (HPP): la causa más frecuente es la atonía uterina
Preeclampsia / eclampsia
Distocia de hombros
Prolapso de cordón
Desprendimiento de placenta</p>`,
      gif: null
    }
  ];

  const main = document.getElementById('posts');
  posts.forEach((p, i) => {
    main.innerHTML += `
      <article class="articulo">
        <div class="articulo-img">
          <img src="${p.imagen}" alt="${p.categoria}" onerror="this.src='https://via.placeholder.com/800x400/F4A4B8/white?text=Imagen+no+encontrada'">
        </div>
        <div class="articulo-body">
          <span class="categoria">${p.categoria}</span>
          <h2>${p.titulo}</h2>
          <p class="meta">📅 ${p.fecha} &nbsp;·&nbsp; ✍️ ${p.autor}</p>
          <p>${p.resumen}</p>
          <button class="leer-mas" onclick="abrirModal(${i})">Leer más →</button>
        </div>
      </article>`;
  });

  function abrirModal(i) {
    const p = posts[i];
    document.getElementById('m-cat').textContent = p.categoria;
    document.getElementById('m-titulo').textContent = p.titulo;
    document.getElementById('m-meta').textContent = `📅 ${p.fecha}  ·  ✍️ ${p.autor}`;

    let contenidoFinal = '';

    if (i === 0) {
      contenidoFinal = `
        <div class="tareas-controles">
          <div class="input-group">
            <input type="text" id="nueva-tarea-input" class="nueva-tarea-input" placeholder="Escribe una nueva tarea...">
            <button class="btn-tarea" onclick="agregarTarea()">➕ Agregar</button>
            <button class="btn-tarea btn-eliminar" onclick="eliminarUltimaTarea()">🗑️ Eliminar última</button>
          </div>
        </div>
        <div id="lista-tareas-container"></div>
        
        <div class="motivacion-container">
          <div class="motivacion-marco">
            <img src="sevenseven.jpg" alt="Imagen de motivación" class="motivacion-imagen" onerror="this.src='https://via.placeholder.com/600x300/FFD1DC/B3416B?text=🌟+Tú+puedes+con+todo+🌟'">
          </div>
          <div class="motivacion-texto">
            ✨ ¡Tú puedes hacerlo! ✨ ദ്ദി◝ ⩊ ◜.ᐟ
          </div>
        </div>
      `;
    } else if (i === 1) {
      let tabsHtml = '<div class="tabs-semana">';
      let contenidoHtml = '';
      
      diasSemana.forEach((dia, idx) => {
        const activo = idx === 0 ? 'activo' : '';
        tabsHtml += `<button class="tab-btn ${activo}" data-dia="${dia}" onclick="cambiarDia('${dia}')">${dia.toUpperCase()}</button>`;
        
        contenidoHtml += `
          <div id="dia-${dia}" class="contenido-dia ${activo}">
            <div class="tareas-dia-container">
              <div class="agregar-tarea-dia">
                <input type="text" id="input-${dia}" class="input-pequeno" placeholder="Nueva tarea para ${dia}...">
                <input type="date" id="fecha-${dia}" class="input-pequeno">
                <button class="btn-pequeno" onclick="agregarTareaDia('${dia}')">➕ Agregar</button>
                <button class="btn-pequeno btn-eliminar" onclick="eliminarUltimaTareaDia('${dia}')">🗑️</button>
              </div>
              <div id="tareas-${dia}"></div>
            </div>
          </div>
        `;
      });
      tabsHtml += '</div>';
      
      contenidoFinal = `
        ${tabsHtml}
        ${contenidoHtml}
        
        <div class="motivacion-container">
          <div class="motivacion-marco">
            <img src="sevenseven.jpg" alt="Imagen de motivación" class="motivacion-imagen" onerror="this.src='https://via.placeholder.com/600x300/FFD1DC/B3416B?text=🌟+Organiza+tu+semana+con+cariño+🌟'">
          </div>
          <div class="motivacion-texto">
            ✨ ¡Cada día es una nueva oportunidad! ✨ 🌸
          </div>
        </div>
      `;
    } else if (p.gif && p.gif !== null) {
      contenidoFinal = `
        <div class="modal-gif-container">
          <img src="${p.gif}" alt="GIF animado">
        </div>
        ${p.contenido}
      `;
    } else {
      contenidoFinal = p.contenido;
    }
    
    document.getElementById('m-contenido').innerHTML = contenidoFinal;
    document.getElementById('modal').classList.add('activo');
    
    if (i === 0) {
      window.guardarTareas = guardarTareas;
      window.cargarTareas = cargarTareas;
      window.renderizarTareas = renderizarTareas;
      window.agregarTarea = agregarTarea;
      window.eliminarUltimaTarea = eliminarUltimaTarea;
      
      function guardarTareas(tareas) {
        localStorage.setItem('listaTareas', JSON.stringify(tareas));
      }

      function cargarTareas() {
        const tareasGuardadas = localStorage.getItem('listaTareas');
        if (tareasGuardadas) {
          return JSON.parse(tareasGuardadas);
        }
        return [
          { id: 1, texto: "Póster de P y P (Pasar a plantilla para mandar a imprimir en papel bond)", completada: false },
          { id: 2, texto: "Empezar trabajo plan de atención de enfermería", completada: false }
        ];
      }

      function renderizarTareas() {
        const tareas = cargarTareas();
        const container = document.getElementById('lista-tareas-container');
        if (!container) return;
        
        if (tareas.length === 0) {
          container.innerHTML = '<p style="text-align:center; color:#C97A9A;">✨ ¡No hay tareas pendientes! ✨</p>';
          return;
        }
        
        container.innerHTML = tareas.map(tarea => `
          <label class="tarea-item">
            <input type="checkbox" class="tarea-checkbox" data-id="${tarea.id}" ${tarea.completada ? 'checked' : ''}>
            <span style="${tarea.completada ? 'text-decoration: line-through; color: #C97A9A;' : ''}">${escapeHtml(tarea.texto)}</span>
          </label>
        `).join('');
        
        document.querySelectorAll('.tarea-checkbox').forEach(checkbox => {
          checkbox.addEventListener('change', function(e) {
            const id = parseInt(this.getAttribute('data-id'));
            const tareasActuales = cargarTareas();
            const tarea = tareasActuales.find(t => t.id === id);
            if (tarea) {
              tarea.completada = this.checked;
              guardarTareas(tareasActuales);
              renderizarTareas();
            }
          });
        });
      }

      function agregarTarea() {
        const input = document.getElementById('nueva-tarea-input');
        const texto = input.value.trim();
        if (texto === '') {
          alert('🌸 Por favor escribe una tarea 🌸');
          return;
        }
        
        const tareas = cargarTareas();
        const nuevoId = Math.max(...tareas.map(t => t.id), 0) + 1;
        tareas.push({
          id: nuevoId,
          texto: texto,
          completada: false
        });
        guardarTareas(tareas);
        input.value = '';
        renderizarTareas();
      }

      function eliminarUltimaTarea() {
        const tareas = cargarTareas();
        if (tareas.length === 0) {
          alert('✨ No hay tareas para eliminar ✨');
          return;
        }
        tareas.pop();
        guardarTareas(tareas);
        renderizarTareas();
      }

      renderizarTareas();
    } else if (i === 1) {
      cargarTareasPorDia();
      diasSemana.forEach(dia => renderizarTareasPorDia(dia));
    }
  }

  function cerrarModal() {
    document.getElementById('modal').classList.remove('activo');
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
  });
</script>
