<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Blog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #f5f5f0;
      color: #222;
    }

    /* ── HEADER ── */
    header {
      background-image: url('chii.jpg');
      background-size: cover;
      background-position: center;
      color: white;
      padding: 4rem 1rem;
      text-align: center;
      position: relative;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
    }
    header h1, header p {
      position: relative;
      z-index: 1;
    }
    header h1 { font-size: 2.2rem; letter-spacing: 2px; }
    header p  { margin-top: .4rem; color: #aaa; font-style: italic; }

    /* ── NAV ── */
    nav {
      background: #16213e;
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: .8rem;
    }
    nav a {
      color: #e0e0e0;
      text-decoration: none;
      font-size: .95rem;
      font-family: sans-serif;
      transition: color .2s;
    }
    nav a:hover { color: #f0a500; }

    /* ── LAYOUT ── */
    .contenedor {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 2rem;
    }

    /* ── ARTÍCULOS ── */
    .articulo {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .articulo-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 3rem;
    }
    .articulo-body { padding: 1.5rem; }
    .categoria {
      display: inline-block;
      background: #f0a500;
      color: white;
      font-size: .75rem;
      font-family: sans-serif;
      padding: .2rem .7rem;
      border-radius: 20px;
      margin-bottom: .8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .articulo h2 { font-size: 1.4rem; margin-bottom: .5rem; }
    .meta {
      font-size: .82rem;
      color: #888;
      font-family: sans-serif;
      margin-bottom: .8rem;
    }
    .articulo p { line-height: 1.7; color: #444; }
    .leer-mas {
      display: inline-block;
      margin-top: 1rem;
      background: #1a1a2e;
      color: white;
      padding: .5rem 1.2rem;
      border-radius: 4px;
      text-decoration: none;
      font-family: sans-serif;
      font-size: .9rem;
      cursor: pointer;
      border: none;
      transition: background .2s;
    }
    .leer-mas:hover { background: #f0a500; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.activo { display: flex; }
    .modal {
      background: white;
      max-width: 650px;
      width: 90%;
      border-radius: 10px;
      padding: 2rem;
      position: relative;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal h2 { font-size: 1.6rem; margin-bottom: .5rem; }
    .modal .meta { margin-bottom: 1rem; }
    .modal p { line-height: 1.8; color: #333; margin-bottom: 1rem; }
    .cerrar {
      position: absolute;
      top: 1rem; right: 1.2rem;
      font-size: 1.5rem;
      cursor: pointer;
      background: none;
      border: none;
      color: #555;
    }

    /* ── SIDEBAR ── */
    aside { display: flex; flex-direction: column; gap: 1.5rem; }
    .widget {
      background: white;
      border-radius: 8px;
      padding: 1.2rem;
